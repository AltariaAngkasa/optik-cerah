<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — OptikCerah</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-root"></div>

<div class="auth-shell">
  <div class="sky-orb" style="width:300px;height:300px;top:10%;left:5%;"></div>
  <div class="sky-orb orb-ring" style="width:160px;height:160px;bottom:8%;right:8%;"></div>
  <div class="auth-card">
    <div class="panel">
      <span class="brand-mark" style="margin-bottom:16px;display:block;" id="authBrandMark"></span>
      <h2>Selamat Datang Kembali</h2>
      <p style="margin-bottom:24px;">Masuk untuk melanjutkan belanja kacamata favoritmu.</p>

      <div class="alert alert-error" id="errorAlert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="nama@email.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Masuk</button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:0.9rem;">
        Belum punya akun? <a href="signup.html" style="color:var(--sky-600);font-weight:700;">Daftar sekarang</a>
      </p>
      <p style="text-align:center;font-size:0.78rem;color:var(--ink-500);margin-top:10px;">
        Demo: customer@optikcerah.com / customer123
      </p>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script>
document.getElementById('authBrandMark').innerHTML = brandMarkSvg();
renderNavbar();

const form = document.getElementById('loginForm');
const errorAlert = document.getElementById('errorAlert');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorAlert.classList.remove('show');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Memproses...';
  try {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const data = await apiCall('/auth/login', { method: 'POST', body: { email, password } });
    toast(`Selamat datang, ${data.user.name}!`, 'success');
    const params = new URLSearchParams(location.search);
    const next = params.get('next');
    setTimeout(() => {
      if (data.user.role === 'admin') window.location.href = 'admin/dashboard.html';
      else window.location.href = next || 'index.html';
    }, 500);
  } catch (err) {
    errorAlert.textContent = err.message;
    errorAlert.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Masuk';
  }
});
</script>
</body>
</html>
